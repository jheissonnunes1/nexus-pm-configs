# Estilo mecânico do Go (control plane). Rode: `golangci-lint run`
# golangci-lint v2 schema. Canonical em nexus-pm-configs/.golangci.yml — cópia
# em cada repo Go no root. CI checa drift contra esta cópia mirror.
version: "2"

linters:
  enable:
    - bodyclose      # fecha response body
    - contextcheck   # propagação de context
    - errorlint      # %w / errors.Is / errors.As
    - gosec          # segurança
    - nilerr
    - revive         # estilo e nomes exportados
  settings:
    revive:
      rules:
        - name: exported          # doc/nomes em identificador exportado
        - name: error-naming
        - name: error-strings
        - name: context-as-argument
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
